<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Age Calculator</title>
    </head>
    <body>
        <main class="container">
            <section class="input-section">
                <div class="input-group">
                    <label for="day">DAY</label>
                    <input type="number" id="day" placeholder="DD" min="1" max="31">
                    <small class="error-msg"></small>
                </div>
                <div class="input-group">
                    <label for="month">MONTH</label>
                    <input type="number" id="month" placeholder="MM" min="1" max="12">
                    <small class="error-msg"></small>
                </div>
                <div class="input-group">
                    <label for="year">YEAR</label>
                    <input type="number" id="year" placeholder="YYYY">
                    <small class="error-msg"></small>
                </div>
            </section>
            <section class="divider">
                <hr>
                <button id="submit-btn" aria-label="Calculer l'âge">
                    <svg xmlns="http://www.w3.org/2000/svg" width="46" height="44" viewBox="0 0 46 44">
                        <path d="M22 5v30M10 25l12 12 12-12"
                            stroke="#FFF"
                            stroke-width="2"
                            fill="none"
                            stroke-linecap="round"
                            stroke-linejoin="round"/>
                    </svg>
                </button>
            </section>
            <section class="output-section">
                <h1><span id="out-years">--</span> years</h1>
                <h1><span id="out-months">--</span> month</h1>
                <h1><span id="out-days">--</span> days</h1>
            </section>
        </main>
        <script src="script.js"></script>
    </body>
</html>
